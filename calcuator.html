<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, Helvetica, sans-serif;
}

.calculator{
    background:#000;
    padding:20px;
    border-radius:25px;
}

.display{
    color:white;
    font-size:64px;
    text-align:right;
    min-height:80px;
    margin-bottom:20px;
    overflow-x:auto;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,75px);
    gap:12px;
}

button{
    width:75px;
    height:75px;
    border:none;
    border-radius:50%;
    font-size:30px;
    cursor:pointer;
    background:#333;
    color:white;
    transition:0.15s;
}

button:hover{
    opacity:0.85;
}

button:active{
    transform:scale(0.95);
}

.orange{
    background:#ff9f0a;
}

.gray{
    background:#a5a5a5;
    color:black;
}

.zero{
    width:162px;
    border-radius:40px;
    grid-column:span 2;
    text-align:left;
    padding-left:30px;
}
</style>

</head>
<body>

<div class="calculator">

    <div class="display js-calculation">0</div>

    <div class="buttons">

        <button class="gray" onclick="clearCalculation()">AC</button>
        <button class="gray" onclick="updateCalculation('(')">(</button>
        <button class="gray" onclick="updateCalculation(')')">)</button>
        <button class="orange" onclick="updateCalculation('/')">÷</button>

        <button onclick="updateCalculation('7')">7</button>
        <button onclick="updateCalculation('8')">8</button>
        <button onclick="updateCalculation('9')">9</button>
        <button class="orange" onclick="updateCalculation('*')">×</button>

        <button onclick="updateCalculation('4')">4</button>
        <button onclick="updateCalculation('5')">5</button>
        <button onclick="updateCalculation('6')">6</button>
        <button class="orange" onclick="updateCalculation('-')">−</button>

        <button onclick="updateCalculation('1')">1</button>
        <button onclick="updateCalculation('2')">2</button>
        <button onclick="updateCalculation('3')">3</button>
        <button class="orange" onclick="updateCalculation('+')">+</button>

        <button class="zero" onclick="updateCalculation('0')">0</button>
        <button onclick="updateCalculation('.')">.</button>
        <button class="orange" onclick="calculate()">=</button>

    </div>

</div>

<script>

let calculation = localStorage.getItem('calculation') || '';

displayCalculation();

function updateCalculation(value){

    calculation += value;

    displayCalculation();

    localStorage.setItem('calculation', calculation);
}

function calculate(){

    try{
        calculation = eval(calculation).toString();
    }
    catch{
        calculation = '';
        alert('Invalid Expression');
    }

    displayCalculation();

    localStorage.setItem('calculation', calculation);
}

function clearCalculation(){

    calculation = '';

    displayCalculation();

    localStorage.setItem('calculation', calculation);
}

function displayCalculation(){

    document.querySelector('.js-calculation').innerHTML =
        calculation || '0';
}

</script>

</body>
</html>
